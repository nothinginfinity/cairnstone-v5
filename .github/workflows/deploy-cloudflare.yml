name: Deploy CairnStone v5

on:
  workflow_dispatch:
    inputs:
      apply_migrations:
        description: "Apply D1 migrations before deploy"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 280908cb4e54b81745740accf5f0500f
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - name: Show Wrangler version
        run: npx wrangler --version

      - name: Apply D1 migrations
        if: github.event.inputs.apply_migrations == 'true'
        run: npx wrangler d1 migrations apply cairnstone-v5 --remote --config wrangler.toml

      - name: Deploy Worker
        run: npx wrangler deploy --config wrangler.toml
